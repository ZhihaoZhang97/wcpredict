name: sync-data

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours during the tournament
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync data from openfootball/worldcup.json
        run: python3 scripts/sync_data.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate synced data
        run: |
          uv sync --frozen
          uv run python -m wcpredict.check

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "no data changes" && exit 0
          git commit -m "data: sync from openfootball/worldcup.json"
          git push
